services:
  - name: api-server
    type: web
    runtime: node
    region: singapore
    buildCommand: pnpm install && pnpm run build
    startCommand: pnpm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
    plan: free

  - name: rpg-game
    type: web
    runtime: node
    region: singapore
    buildCommand: cd artifacts/rpg-game && pnpm install && pnpm run build
    startCommand: cd artifacts/rpg-game && npx serve dist -l 4173
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: https://api-server.onrender.com
      - key: BASE_PATH
        value: /
    plan: free
